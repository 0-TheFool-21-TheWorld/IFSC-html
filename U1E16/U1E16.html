<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 16</title>
</head>
<body>
    <form action="#">
        <div>
            <label for="nome">nome completo:</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div>
            <label for="user">login:</label>
            <input
                type="text"
                id="user"
                name="user"
                required
                minlength="3"
                maxlength="20"
            >
        </div>

        <div>
            <label for="user">senha:</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                minlength="5"
                maxlength="20"
            >
        </div>

        <div>
            <label for="user">repitir senha:</label>
            <input
                type="password"
                id="passwordtry"
                name="passwordtry"
                required
                minlength="5"
                maxlength="20"
            >
        </div>

        <div class="button">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
