<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>
</head>
<body>
    <form action="#">
        <div style="margin-bottom: 10px;">
            <label for="nome">nome Completo:</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div style="margin-bottom: 10px;">
            <label for="nome">Login:</label>
            <input
                type="text"
                id="login"
                name="login"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div style="margin-bottom: 10px;">
            <label for="nome">Senha:</label>
            <input
                type="password"
                id="sen"
                name="sen"
                required
                minlength="6"
                maxlength="256"
            >
        </div>

         <div>
            <label for="data">Data de nascimento:</label>
            <input
                type="date"
                id="data"
                name="data"
                required
            >
        </div>

        <div>
            <label for="status">Status:</label>
            <select class="status" id="status">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <div>
             <label>Tipo: <input 
                type="radio" 
                name="tipo" 
                value="est"
                required
                checked
                >Estudante</label>

            <label><input 
                type="radio" 
                name="tipo" 
                value="prof"
                required
                >Professor</label>
            <label><input 
                type="radio" 
                name="tipo" 
                value="tecadm"
                required
                >Técnico-Adminstrativo</label>
        </div>

        <div>
            <label for="obs">Observações:</label>
            <textarea id="obs" name="obs" cols="30" rows="5"></textarea>
        </div>

         <label>Módulos:</label>
            <input 
            type="checkbox" 
            id="ensino" 
            name="Ensino" 
            value="ensino">
            <label>Ensino</label>
            
            <input 
            type="checkbox" 
            id="pesquisa" 
            name="Pesquisa" 
            value="pesquisa"><label>Pesquisa</label>

            <input 
            type="checkbox" 
            id="extensao" 
            name="Extensao" 
            value="extensao"><label>Extensão</label>

        <div class="button">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
