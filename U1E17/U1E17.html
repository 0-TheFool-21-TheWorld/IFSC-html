<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 17</title>
</head>
<body>
    <form action="#">
        <div style="margin-bottom: 10px;">
            <label for="nome">nome do produto:</label>
            <input
                type="text"
                id="nome"
                nome="nome"
                required
                minlength="3"
                maxlength="256"
            />
        </div>

        <div>
            <label for="desc">descrição:</label>
            <textarea id="desc" name="descrição" cols="30" rows="5"></textarea>
        </div>

        <div>
            <label for="data">data da compra:</label>
            <input
                type="date"
                id="data"
                nome="data"
                required
            />
        </div>

        <div>
            <label for="qnt">quantidade:</label>
            <input
                type="number"
                id="qnt"
                nome="qnt"
                required
                min="5"
                max="50"
            />
        </div>

        <div class="button">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
