<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style19.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 19</title>
</head>
<body>
    <form action="#">
        <div style="margin-bottom: 10px;">
            <label for="nome">Nome Completo:</label>
            <input
                placeholder="Nome completo"
                type="text"
                id="nome"
                name="nome"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div style="margin-bottom: 10px;">
            <label for="nome">Login:</label>
            <input
                placeholder="Login"
                type="text"
                id="login"
                name="login"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div style="margin-bottom: 10px;">
            <label for="nome">Senha:</label>
            <input
                placeholder="Senha"
                type="password"
                id="sen"
                name="sen"
                required
                minlength="6"
                maxlength="256"
            >
        </div>

         <div>
            <label for="data">Data de nascimento:</label>
            <input
                type="date"
                id="data"
                name="data"
                required
            >
        </div>

        <div>
            <label for="status">Status:</label>
            <select class="status" id="status">
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <p>Tipo:</p>
        <div class="tipo">
             <label>Estudante<input 
                type="radio" 
                name="tipo" 
                value="est"
                required
                checked
                class="radio"
                ></label>

            <label>Professor<input 
                type="radio" 
                name="tipo" 
                value="prof"
                required
                class="radio"
                ></label>
            <label>Técnico-Adminstrativo<input 
                type="radio" 
                name="tipo" 
                value="tecadm"
                radio="radio"
                class="radio"
                required
                ></label>
        </div>

        <div>
            <label for="obs" class="obs">Observações:</label>
            <textarea id="obs" name="obs" cols="30" rows="5" placeholder="Observações"></textarea>
        </div>

        <p>Módulos:</p>
            <input 
            type="checkbox"
            class="radio"
            id="ensino" 
            name="Ensino" 
            value="ensino">
            <label>Ensino</label>
            
            <input 
            type="checkbox" 
            id="pesquisa" 
            name="Pesquisa" 
            class="radio"
            value="pesquisa"><label>Pesquisa</label>

            <input
            type="checkbox" 
            id="extensao" 
            name="Extensao" 
            class="radio"
            value="extensao"><label>Extensão</label>

        <div class="button">
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
