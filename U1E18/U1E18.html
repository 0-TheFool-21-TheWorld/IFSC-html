<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 18</title>
</head>
<body>
    <h1>Cadastro de estudantes para o JIFSC</h1>
    <form action="#">
        <div style="margin-bottom: 10px;">
            <label for="nome">Nome:</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                minlength="3"
                maxlength="256"
            >
        </div>

        <div>
            <label for="cpf">CPF:</label>
            <input
                type="text"
                id="cpf"
                name="cpf"
                required
                minlength="11"
                maxlength="11"
            >
        </div>

        <div>
            <label for="data">Data de nascimento:</label>
            <input
                type="date"
                id="data"
                name="data"
                required
            >
        </div>

        <div>
            <label for="tel">Telefone:</label>
            <input
                type="text"
                id="tel"
                name="tel"
                required
            >
        </div>

        <div>
            <label for="email">E-mail:</label>
            <input
                type="email"
                id="email"
                name="email"
                required
            >
        </div>

        <div>
            <label for="cur">Nome do curso:</label>
            <input
                type="text"
                id="cur"
                name="cur"
                required
            >
        </div>

        <div>
             <label>Modalidade: <input 
                type="radio" 
                name="Modalidade" 
                value="Individual"
                required
                checked
                >Individual</label>

            <label><input 
                type="radio" 
                name="Modalidade" 
                value="Coletiva"
                required
                >Individual</label>
        </div>

        <div class="button">
            <button type="submit">Cadastrar</button>
            <button type="reset">Limpar</button>
        </div>
    </form>
</body>
</html>
